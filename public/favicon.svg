<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0b0d11; }
      .accent { fill: #5b8fb9; stroke: #5b8fb9; stroke-width: 1.5; }
    </style>
  </defs>
  <rect width="32" height="32" class="bg"/>
  <!-- Outer rectangle (16:9 aspect ratio) -->
  <rect x="4" y="8" width="24" height="13.5" class="accent" fill="none"/>
  <!-- Inner rectangle (4:3 aspect ratio) -->
  <rect x="7" y="11" width="18" height="13.5" class="accent" fill="none"/>
  <!-- Center ratio symbol ":" -->
  <circle cx="16" cy="14" r="1.5" class="accent" fill="#5b8fb9"/>
  <circle cx="16" cy="20" r="1.5" class="accent" fill="#5b8fb9"/>
</svg>